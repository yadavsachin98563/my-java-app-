name: Direct WAR Deploy Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/

jobs:
  deploy:
    name: Push Nexus + SCP + WebLogic Deploy
    runs-on: [self-hosted, ci-server]

    steps:

      # Checkout code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Verify WAR exists
      - name: Verify WAR File
        run: ls -lh sample.war

      # Upload WAR to Nexus
      - name: Upload WAR to Nexus
        run: |
          curl --fail -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

      # Setup SSH Key
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $WORKER_IP >> ~/.ssh/known_hosts

      # Copy WAR to worker-node
      - name: Copy WAR to Worker Node
        run: |
          scp sample.war oracle@$WORKER_IP:$DEPLOY_PATH

      # Deploy WAR in WebLogic on worker-node
      - name: Deploy to WebLogic
        run: |
          ssh oracle@$WORKER_IP << 'EOF'
          source /home/oracle/.bash_profile
          cd /home/oracle/WLS/Oracle/Middleware/Oracle_Home/oracle_common/common/bin

          ./wlst.sh <<EOT
          connect("weblogic","sachin@123","t3://localhost:7001")
          deploy("sampleapp","/home/oracle/sample.war",targets="AdminServer")
          exit()
          EOT
          EOF

      # Verify Nexus Upload
      - name: Verify WAR in Nexus
        run: |
          curl -I -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war
