name: Fast WAR Deploy Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:

  deploy:
    name: Fast Deploy WAR
    runs-on: [self-hosted, ci-server]

    steps:

      # =====================
      # 1. Checkout
      # =====================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =====================
      # 2. Upload to Nexus (FAST)
      # =====================
      - name: Push WAR to Nexus
        run: |
          curl -s -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

      # =====================
      # 3. Copy to WebLogic (FAST SCP)
      # =====================
      - name: Deploy to WebLogic Server
        run: |
          scp -o StrictHostKeyChecking=no \
          sample.war \
          oracle@$WORKER_IP:$DEPLOY_PATH

      # =====================
      # 4. Quick Verify
      # =====================
      - name: Verify Deployment
        run: |
          ssh oracle@$WORKER_IP "ls -lh $DEPLOY_PATH/sample.war"
