name: Fresh CI-CD WebLogic Setup

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:

  deploy:
    name: Build WAR Push Nexus Deploy WebLogic
    runs-on: [self-hosted, ci-server]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Maven
        run: mvn -version

      - name: Build WAR File
        run: mvn clean package -DskipTests

      - name: Rename WAR
        run: cp target/*.war sample.war

      - name: Upload WAR to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

      - name: Install sshpass
        run: |
          sudo yum install -y sshpass || \
          sudo dnf install -y sshpass || \
          sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy WAR to WebLogic Server
        run: |
          sshpass -p "${{ secrets.WORKER_PASS }}" \
          scp -o StrictHostKeyChecking=no \
          sample.war \
          oracle@$WORKER_IP:$DEPLOY_PATH

      - name: Verify File on WebLogic Server
        run: |
          sshpass -p "${{ secrets.WORKER_PASS }}" \
          ssh -o StrictHostKeyChecking=no \
          oracle@$WORKER_IP \
          "ls -lh $DEPLOY_PATH"

      - name: Verify WAR in Nexus
        run: |
          curl -I -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war
