name: Deploy WAR from GitHub to WebLogic Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:
  deploy:
    name: GitHub WAR to Worker Deploy
    runs-on: [self-hosted, ci-server]

    steps:

      # Get latest repo files from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Verify WAR file exists in repo
      - name: Verify WAR File
        run: ls -lh sample.war

      # Configure SSH key
      - name: Setup SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $WORKER_IP >> ~/.ssh/known_hosts

      # Copy WAR to WebLogic worker node
      - name: Deploy WAR to Worker Node
        run: |
          scp sample.war root@$WORKER_IP:$DEPLOY_PATH

      # Verify file copied
      - name: Verify Deployment
        run: |
          ssh root@$WORKER_IP \
          "ls -lh $DEPLOY_PATH/sample.war"
