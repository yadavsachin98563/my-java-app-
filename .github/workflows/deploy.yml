name: Deploy Existing WAR from Nexus to WebLogic

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WAR_FILE: sample.war

  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:
  deploy:
    name: Download WAR from Nexus and Deploy
    runs-on: [self-hosted, ci-server]

    steps:

      # Download already uploaded WAR from Nexus
      - name: Download WAR from Nexus
        run: |
          curl --fail --connect-timeout 5 --max-time 20 \
          -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$WAR_FILE

      # Verify WAR downloaded
      - name: Verify WAR
        run: ls -lh sample.war

      # Setup SSH key
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $WORKER_IP >> ~/.ssh/known_hosts

      # Copy WAR to worker node
      - name: Copy WAR to WebLogic Server
        run: |
          scp sample.war oracle@$WORKER_IP:$DEPLOY_PATH

      # Verify deployment file exists
      - name: Verify on Worker Node
        run: |
          ssh oracle@$WORKER_IP \
          "ls -lh $DEPLOY_PATH/sample.war"
