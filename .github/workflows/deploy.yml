name: CI-CD WebLogic Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  VERSION: v1.${{ github.run_number }}
  NEXUS_URL: http://192..168.182.166:8081
  NEXUS_REPO: maven-releases

jobs:

# ==================================
# CI JOB (BUILD + PUSH TO NEXUS)
# ==================================
  build:
    name: Build WAR and Push to Nexus
    runs-on: [self-hosted, ci-server]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build WAR
        run: mvn clean package

      - name: Rename WAR
        run: cp target/*.war sample.war

      - name: Upload WAR to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

# ==================================
# CD JOB REMOVED
# DEPLOY USING SCP FROM CI SERVER
# ==================================

      - name: Copy WAR to WebLogic Worker
        run: |
          sshpass -p "${{ secrets.WORKER_PASS }}" scp -o StrictHostKeyChecking=no \
          sample.war \
          root@192.168.182.168:/home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

      - name: Verify File on Worker Server
        run: |
          sshpass -p "${{ secrets.WORKER_PASS }}" ssh -o StrictHostKeyChecking=no \
          oracle@192.168.182.168 \
          "ls -lh /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/"
