name: CI-CD WebLogic Pipeline

on:
  push:
    branches: [main]

env:
  APP_NAME: sample
  VERSION: v1.${{ github.run_number }}
  NEXUS_URL: http://nexus.local:8081
  NEXUS_REPO: maven-releases

jobs:
  build:
    runs-on: [self-hosted, ci-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build WAR
        run: mvn clean package

      - name: Upload WAR to Nexus
        run: |
          cp target/*.war sample.war
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

  deploy:
    needs: build
    runs-on: [self-hosted, cd-server]

    steps:
      - name: Download WAR
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

      - name: Deploy to WebLogic
        run: |
          java weblogic.Deployer \
          -adminurl t3://weblogic-admin:7001 \
          -username ${{ secrets.WL_USER }} \
          -password ${{ secrets.WL_PASS }} \
          -redeploy \
          -name sampleApp \
          -source sample.war \
          -targets AdminServer
