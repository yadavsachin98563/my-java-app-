name: Fast Nexus to WebLogic Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WAR_FILE: sample.war
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:
  deploy:
    name: Download from Nexus and Deploy
    runs-on: [self-hosted, ci-server]

    steps:

      # Download WAR from Nexus (fast with timeout)
      - name: Download WAR from Nexus
        run: |
          curl --connect-timeout 5 --max-time 30 -s \
          -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$WAR_FILE

      # Verify file downloaded
      - name: Verify WAR File
        run: ls -lh sample.war

      # Copy WAR to WebLogic server
      - name: Copy WAR to Worker Node
        run: |
          scp -o StrictHostKeyChecking=no \
          sample.war \
          oracle@$WORKER_IP:$DEPLOY_PATH

      # Verify on target server
      - name: Verify Deployment
        run: |
          ssh -o StrictHostKeyChecking=no \
          oracle@$WORKER_IP \
          "ls -lh $DEPLOY_PATH/sample.war"
