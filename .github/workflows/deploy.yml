name: Fast WAR Nexus + WebLogic Deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WORKER_IP: 192.168.182.168
  DEPLOY_PATH: /home/oracle/WLS/Oracle/Middleware/Oracle_Home/user_projects/domains/mit/autodeploy/

jobs:
  deploy:
    name: Push WAR to Nexus and Deploy
    runs-on: [self-hosted, ci-server]

    steps:

      # Fast checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      # Verify WAR file exists
      - name: Check WAR File
        run: ls -lh sample.war

      # Upload WAR to Nexus
      - name: Upload WAR to Nexus
        run: |
          curl -s -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/sample.war

      # Copy WAR to WebLogic worker node
      - name: Deploy WAR to Worker Node
        run: |
          scp -o StrictHostKeyChecking=no \
          sample.war \
          oracle@$WORKER_IP:$DEPLOY_PATH

      # Verify deployed file
      - name: Verify Deployment
        run: |
          ssh -o StrictHostKeyChecking=no \
          oracle@$WORKER_IP \
          "ls -lh $DEPLOY_PATH/sample.war"
