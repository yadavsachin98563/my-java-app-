name: Fast CI-CD WebLogic WAR Deployment

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  VERSION: v1.${{ github.run_number }}
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted

jobs:

# ==========================================
# CI JOB (FAST UPLOAD)
# ==========================================
  upload:
    name: Upload WAR to Nexus
    runs-on: [self-hosted, ci-server]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload WAR Directly
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file sample.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME.war

# ==========================================
# CD JOB (FAST DEPLOY)
# ==========================================
  deploy:
    name: Deploy to WebLogic
    needs: upload
    runs-on: [self-hosted, cd-server]

    steps:

      - name: Download WAR
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o app.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME.war

      - name: Redeploy Application
        run: |
          java weblogic.Deployer \
          -adminurl t3://192.168.182.166:7001 \
          -username ${{ secrets.WL_USER }} \
          -password ${{ secrets.WL_PASS }} \
          -redeploy \
          -name sample \
          -source app.war \
          -targets AdminServer
