name: CI-CD WebLogic Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  VERSION: v1.${{ github.run_number }}
  NEXUS_URL: http://nexus.local:8081
  NEXUS_REPO: maven-releases

jobs:

# ==========================
# CI JOB (BUILD + NEXUS PUSH)
# ==========================
  build:
    name: Build WAR and Push to Nexus
    runs-on: [self-hosted, ci-server]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

	      - name: Set Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build WAR using Maven
        run: mvn clean package

      - name: Rename WAR
        run: |
          cp target/*.war $APP_NAME.war

      - name: Upload WAR to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file $APP_NAME.war \
          "$NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME-$VERSION.war"


# ==========================
# CD JOB (WEBLOGIC DEPLOY)
# ==========================
  deploy:
    name: Deploy to WebLogic (No Internet Server)
    needs: build
    runs-on: [self-hosted, cd-server]

    steps:

      - name: Download WAR from Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o app.war \
          "$NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME-$VERSION.war"

      - name: Stop Existing App (optional)
        run: |
          java weblogic.Deployer \
          -adminurl t3://weblogic-admin:7001 \
          -username admin \
          -password ${{ secrets.WL_PASS }} \
          -undeploy \
          -name sampleApp || true

      - name: Deploy New WAR
        run: |
          java weblogic.Deployer \
          -adminurl t3://weblogic-admin:7001 \
          -username admin \
          -password ${{ secrets.WL_PASS }} \
          -deploy \
          -name sampleApp \
          -source app.war \
          -targets AdminServer
