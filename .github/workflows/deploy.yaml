name: CI-CD WebLogic Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: sample
  VERSION: v1.${{ github.run_number }}
  NEXUS_URL: http://192.168.182.166:8081
  NEXUS_REPO: raw-hosted
  WL_URL: t3://192.168.182.166:7001
  APP_URL: http://192.168.182.166:7001/sample

jobs:

# ===================================
# CI JOB (master-node)
# ===================================
  build:
    name: Build WAR and Upload to Nexus
    runs-on: [self-hosted, ci-server]

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Rename WAR
        run: cp target/*.war $APP_NAME.war

      - name: Upload to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file $APP_NAME.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME-$VERSION.war


# ===================================
# CD JOB (worker-node)
# ===================================
  deploy:
    name: Deploy WAR to WebLogic
    needs: build
    runs-on: [self-hosted, cd-server]

    steps:

      - name: Download WAR
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          -o app.war \
          $NEXUS_URL/repository/$NEXUS_REPO/$APP_NAME-$VERSION.war

      - name: Undeploy Old App
        run: |
          java weblogic.Deployer \
          -adminurl $WL_URL \
          -username ${{ secrets.WL_USER }} \
          -password ${{ secrets.WL_PASS }} \
          -undeploy \
          -name sample || true

      - name: Deploy New WAR
        run: |
          java weblogic.Deployer \
          -adminurl $WL_URL \
          -username ${{ secrets.WL_USER }} \
          -password ${{ secrets.WL_PASS }} \
          -deploy \
          -name sample \
          -source app.war \
          -targets AdminServer

      - name: Verify Deployment
        run: curl -I $APP_URL || true
